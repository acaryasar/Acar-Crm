services:

  postgres:

    image: postgres:16



    container_name: acar-crm-postgres



    restart: unless-stopped



    ports:

      - "5433:5432"



    environment:

      POSTGRES_USER: acarcrm

      POSTGRES_PASSWORD: acar-crm123

      POSTGRES_DB: acar_crm_ai



    volumes:

      - postgres_data:/var/lib/postgresql/data



volumes:

  postgres_data: